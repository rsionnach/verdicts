name: Release to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        run: uv build
        working-directory: lib/python

      - name: Verify package
        run: uvx twine check lib/python/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: lib/python/dist/
        # Uses trusted publishing - no token needed!
        # Configure at: https://pypi.org/manage/project/nthlayer-learn/settings/publishing/
