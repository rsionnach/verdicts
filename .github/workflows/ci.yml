name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/python/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: lib/python

      - name: Run linting
        run: uv run ruff check nthlayer_learn/ tests/ --ignore E501,B008,F841,B007,E402,E721,E722,B012,I001
        working-directory: lib/python

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short -x
        working-directory: lib/python

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: lib/python

      - name: Run ruff
        run: uv run ruff check nthlayer_learn/ tests/ --ignore E501,B008,F841,B007,E402,E721,E722,B012,I001
        working-directory: lib/python

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: lib/python

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit --progress-spinner off || echo "pip-audit found vulnerabilities (non-blocking)"
        working-directory: lib/python
